<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gundega Morite | Zürich</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; }
        body, html { margin: 0; padding: 0; background-color: var(--dark); color: white; font-family: 'Montserrat', sans-serif; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* DISEÑO DE LOGO MINIMALISTA (Para evitar el parche azul) */
        .brand-container { text-align: center; border: 1px solid rgba(197, 160, 89, 0.3); padding: 60px 40px; background: linear-gradient(145deg, #0f0f0f, #050505); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .logo-text { font-family: 'Cinzel', serif; font-size: 3.5rem; letter-spacing: 15px; color: var(--gold); text-transform: uppercase; margin: 0; line-height: 1; }
        .logo-tagline { font-size: 0.7rem; letter-spacing: 8px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 20px; }
        
        .divider { width: 40px; height: 1px; background-color: var(--gold); margin: 30px auto; }

        .cta-button { display: inline-block; margin-top: 20px; padding: 15px 35px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-size: 0.75rem; letter-spacing: 4px; transition: all 0.4s; text-transform: uppercase; }
        .cta-button:hover { background-color: var(--gold); color: var(--dark); }

        footer { position: absolute; bottom: 30px; font-size: 0.6rem; letter-spacing: 3px; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="logo-text">GUNDEGA</h1>
        <div class="logo-tagline">Nails & Beauty • Zürich</div>
        <div class="divider"></div>
        <a href="#" class="cta-button">Booking Inquiry</a>
    </div>

    <footer>Zürich Seefeld • Powered by FIKAMI</footer>

</body>
</html>
