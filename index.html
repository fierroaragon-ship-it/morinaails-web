<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gundega Morite | High-End Nails Zürich</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --gold-bright: #f0d78c;
            --espresso: #0d0d0d;
            --text: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--espresso);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* FONDO DE MÁRMOL DINÁMICO */
        .marble-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(13,13,13,0.7), rgba(13,13,13,0.7)), 
                        url('https://images.unsplash.com/photo-1508280756091-9bed7ff4933d?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .logo-container {
            width: 120px;
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.8);
        }

        /* Usaremos un placeholder elegante para su logo */
        .logo-circle {
            width: 100px; height: 100px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 2rem; color: var(--gold);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--gold), var(--gold-bright), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 50px;
            opacity: 0;
        }

        /* BOTÓN ESPECTACULAR */
        .cta-gold {
            position: relative;
            padding: 18px 45px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 3px;
            overflow: hidden;
            transition: 0.5s;
            opacity: 0;
        }

        .cta-gold:hover {
            color: var(--espresso);
            background: var(--gold);
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.5);
        }

        /* SECCIÓN DE SERVICIOS MINIMALISTA */
        .services-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(197, 160, 89, 0.2);
            margin-top: -50px;
        }

        .service-box {
            background: var(--espresso);
            padding: 80px 40px;
            text-align: center;
            transition: 0.5s;
        }

        .service-box:hover {
            background: #151515;
        }

        .service-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .service-box p {
            font-size: 0.8rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.5);
        }

        @media (max-width: 768px) {
            .services-preview { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="marble-bg" id="bg"></div>

    <section class="hero">
        <div class="logo-container" id="logo">
            <img src="https://i.ibb.co/3mN9R0t/morinails-logo.png" style="width: 150px; height: auto;">
        </div>
        <h1 id="title">Gundega Morite</h1>
        <div class="subtitle" id="subtitle">Nails & Beauty • Zürich Seefeld</div>
        <a href="#" class="cta-gold" id="cta">PRIVATE BOOKING</a>
    </section>

    <div class="services-preview">
        <div class="service-box">
            <h3>Manicure</h3>
            <p>Perfección técnica y cuidado cuticular profundo.</p>
        </div>
        <div class="service-box" style="border-left: 1px solid rgba(197,160,89,0.1); border-right: 1px solid rgba(197,160,89,0.1);">
            <h3>Gel Design</h3>
            <p>Arte minimalista con productos premium europeos.</p>
        </div>
        <div class="service-box">
            <h3>Pedicure</h3>
            <p>Experiencia de lujo y estética impecable.</p>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const tl = gsap.timeline();

            // Animación cinematográfica de entrada
            tl.to("#bg", { scale: 1, duration: 3, ease: "power2.out" })
              .to("#logo", { opacity: 1, scale: 1, duration: 1.5, ease: "back.out(1.7)" }, "-=2")
              .to("#title", { opacity: 1, duration: 2, ease: "power3.out" }, "-=1")
              .to("#subtitle", { opacity: 1, y: -10, duration: 1.5 }, "-=1.5")
              .to("#cta", { opacity: 1, duration: 1 }, "-=1");
        });
    </script>
</body>
</html>
