<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gundega Morite | Zürich</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --espresso: #0d0d0d; --dark-surface: #1a1a1a; }
        body, html { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            color: white; font-family: 'Montserrat', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        
        /* DISEÑO DE MARCA BLINDADO */
        .hero {
            padding: 100px 20px;
            text-align: center;
            border: 1px solid rgba(197, 160, 89, 0.2);
            margin-top: 50px;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px);
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            letter-spacing: 15px;
            background: linear-gradient(to right, #c5a059, #f0d78c, #c5a059);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin: 0;
        }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 7px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-top: 15px;
        }

        .divider {
            width: 50px; height: 1px;
            background: var(--gold);
            margin: 30px auto;
        }

        .cta {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .cta:hover { background: var(--gold); color: black; }

        .info-footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="logo-text">GUNDEGA</h1>
        <div class="tagline">High-End Nails • Zürich</div>
        <div class="divider"></div>
        <a href="#" class="cta">Book Appointment</a>
    </div>

    <div class="info-footer">
        FORCHSTRASSE 86, 8008 ZÜRICH<br>
        POWERED BY FIKAMI
    </div>

</body>
</html>
